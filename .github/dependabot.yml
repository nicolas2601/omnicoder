version: 2
updates:
  - package-ecosystem: npm
    directory: "/packages/omnicoder"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - omnicoder
    commit-message:
      prefix: chore(deps)
      include: scope
    reviewers:
      - nicolas2601
    assignees:
      - nicolas2601

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
      include: scope
    reviewers:
      - nicolas2601
    assignees:
      - nicolas2601
