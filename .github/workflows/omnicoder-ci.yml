name: omnicoder-ci

on:
  push:
    branches: [main, v5-migration]
    paths:
      - "packages/omnicoder/**"
      - "bun.lock"
      - "package.json"
      - ".github/workflows/omnicoder-ci.yml"
  pull_request:
    branches: [main, v5-migration]
    paths:
      - "packages/omnicoder/**"
      - "bun.lock"
      - "package.json"
      - ".github/workflows/omnicoder-ci.yml"
  workflow_dispatch:

concurrency:
  group: omnicoder-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve Bun install cache dir
        id: bun-cache
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "dir=${USERPROFILE}\\.bun\\install\\cache" >> "$GITHUB_OUTPUT"
          else
            echo "dir=${HOME}/.bun/install/cache" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ${{ steps.bun-cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --cwd packages/omnicoder typecheck

      - name: Test (JUnit reporter)
        run: bun run --cwd packages/omnicoder test:ci

      - name: Upload JUnit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnicoder-junit-${{ matrix.os }}
          path: packages/omnicoder/.artifacts/unit/junit.xml
          if-no-files-found: warn
          retention-days: 14
