name: omnicoder-release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v5.0.0)"
        required: true
        type: string

concurrency:
  group: omnicoder-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve release tag"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing tag: ${TAG}"

      - name: Extract changelog entry
        id: changelog
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts/release
          NOTES_FILE=".artifacts/release/notes.md"

          # Strip leading "v" so TAG="v5.0.0-alpha.1" matches header "## [5.0.0-alpha.1]".
          TAG_BARE="${TAG#v}"

          if [ -f CHANGELOG.md ]; then
            awk -v tag="${TAG}" -v bare="${TAG_BARE}" '
              BEGIN { inside = 0 }
              /^##[[:space:]]/ {
                if (inside) { exit }
                if (index($0, tag) > 0 || index($0, bare) > 0) { inside = 1; next }
              }
              inside { print }
            ' CHANGELOG.md > "$NOTES_FILE"
          fi

          if [ ! -s "$NOTES_FILE" ]; then
            echo "::warning::No changelog entry found for ${TAG} — using recent commit log (capped)"
            # Prefer range since previous omnicoder tag; exclude merges; cap at 100
            # commits so we stay under GitHub's 125 000-char release body limit.
            PREV_TAG="$(git tag --sort=-creatordate --list 'v[0-9]*.[0-9]*.[0-9]*' \
              | grep -Fxv "${TAG}" | head -n1 || true)"
            {
              echo "_Auto-generated release notes (CHANGELOG entry missing)._"
              echo ""
              if [ -n "$PREV_TAG" ]; then
                git log --no-merges --pretty=format:'- %s (%h)' \
                  "${PREV_TAG}..${TAG}" | head -n 100
              else
                git log --no-merges --pretty=format:'- %s (%h)' "${TAG}" | head -n 100
              fi
            } > "$NOTES_FILE"
          fi

          # Safety: hard-trim to <100k chars to stay clear of GitHub's 125k limit.
          if [ "$(wc -c < "$NOTES_FILE")" -gt 100000 ]; then
            echo "::warning::Notes exceed 100k chars; truncating"
            head -c 99000 "$NOTES_FILE" > "$NOTES_FILE.tmp"
            printf '\n\n…\n\n_(truncated — see CHANGELOG.md for full notes)_\n' \
              >> "$NOTES_FILE.tmp"
            mv "$NOTES_FILE.tmp" "$NOTES_FILE"
          fi

          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Pack @omnicoder/core as tarball
        id: pack
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts/release
          VERSION="${TAG#v}"
          OUT_DIR=".artifacts/release"
          TARBALL="${OUT_DIR}/omnicoder-core-${VERSION}.tgz"

          tar --exclude='node_modules' \
              --exclude='.artifacts' \
              -czf "$TARBALL" \
              -C packages omnicoder

          # Bundle install script and root install binary for convenience.
          cp install "${OUT_DIR}/install.sh" 2>/dev/null || true
          if [ -d packages/omnicoder/scripts ]; then
            tar -czf "${OUT_DIR}/omnicoder-scripts-${VERSION}.tgz" -C packages/omnicoder scripts
          fi

          ls -lah "$OUT_DIR"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Pack @nicolas2601/omnicoder (npm package)
        id: pack_npm
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          # Sync npm package version with the tag.
          cd packages/omnicoder-npm
          node -e '
            const fs = require("fs");
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.version = process.env.VERSION;
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
            console.log("set version:", p.version);
          '

          # prepack runs bundle-assets automatically.
          npm pack
          mv nicolas2601-omnicoder-*.tgz ../../.artifacts/release/

          ls -lah ../../.artifacts/release/
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN secret not set — skipping npm publish. Add it in repo Settings → Secrets."
            exit 0
          fi

          VERSION="${TAG#v}"
          # Choose dist-tag: alpha/beta/rc versions go to their own tag; stable → latest.
          DIST_TAG="latest"
          case "${VERSION}" in
            *-alpha*) DIST_TAG="alpha" ;;
            *-beta*)  DIST_TAG="beta"  ;;
            *-rc*)    DIST_TAG="next"  ;;
          esac
          echo "Publishing version=${VERSION} dist-tag=${DIST_TAG}"

          TARBALL=$(ls .artifacts/release/nicolas2601-omnicoder-*.tgz | head -1)
          if [ -z "${TARBALL}" ]; then
            echo "::error::No npm tarball found in .artifacts/release/"
            exit 1
          fi

          npm publish "${TARBALL}" --access public --tag "${DIST_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          NOTES_FILE: ${{ steps.changelog.outputs.notes_file }}
        run: |
          set -euo pipefail
          ASSETS=(.artifacts/release/omnicoder-core-*.tgz)
          if ls .artifacts/release/omnicoder-scripts-*.tgz >/dev/null 2>&1; then
            ASSETS+=(.artifacts/release/omnicoder-scripts-*.tgz)
          fi
          if ls .artifacts/release/nicolas2601-omnicoder-*.tgz >/dev/null 2>&1; then
            ASSETS+=(.artifacts/release/nicolas2601-omnicoder-*.tgz)
          fi
          if [ -f .artifacts/release/install.sh ]; then
            ASSETS+=(.artifacts/release/install.sh)
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ASSETS[@]}" --clobber
          else
            gh release create "${TAG}" "${ASSETS[@]}" \
              --title "OmniCoder ${TAG}" \
              --notes-file "${NOTES_FILE}"
          fi
